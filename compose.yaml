services:
  db:
    image: postgres:15
    container_name: analytics_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - analytics_network

  data_load:
    build:
      context: .
      dockerfile: data_load/Dockerfile
      network: host
    container_name: data_load_service
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./plots:/app/plots
    networks:
      - analytics_network

  data_quality_analysis:
    build:
      context: .
      dockerfile: data_quality_analysis/Dockerfile
      network: host
    container_name: data_quality_service
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      data_load:
        condition: service_completed_successfully
    volumes:
      - ./reports:/app/reports
    networks:
      - analytics_network

  data_research:
    build:
      context: .
      dockerfile: data_research/Dockerfile
      network: host
    container_name: data_research_service
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      data_load:
        condition: service_completed_successfully
    volumes:
      - ./reports:/app/reports
    networks:
      - analytics_network

  visualization:
    build:
      context: .
      dockerfile: visualization/Dockerfile
      network: host
    container_name: visualization_service
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      data_load:
        condition: service_completed_successfully
      data_research:
        condition: service_completed_successfully
    volumes:
      - ./reports:/app/reports
      - ./plots:/app/plots
    networks:
      - analytics_network

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      network: host
    container_name: web_service
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      data_quality_analysis:
        condition: service_completed_successfully
      data_research:
        condition: service_completed_successfully
      visualization:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./plots:/app/plots
    networks:
      - analytics_network

volumes:
  postgres_data:

networks:
  analytics_network:
    driver: bridge