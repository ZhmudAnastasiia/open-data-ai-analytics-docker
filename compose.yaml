services:
  db:
    image: postgres:15
    container_name: analytics_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - analytics_network

  data_load:
    build:
      context: ./data_load
      dockerfile: Dockerfile
    container_name: data_load_service
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./plots:/app/plots
    networks:
      - analytics_network

  data_quality_analysis:
    build:
      context: ./data_quality_analysis
      dockerfile: Dockerfile
    container_name: data_quality_service
    env_file:
      - .env
    depends_on:
      - db
      - data_load
    volumes:
      - ./reports:/app/reports
    networks:
      - analytics_network

  data_research:
    build:
      context: ./data_research
      dockerfile: Dockerfile
    container_name: data_research_service
    env_file:
      - .env
    depends_on:
      - db
      - data_load
    volumes:
      - ./reports:/app/reports
    networks:
      - analytics_network

  visualization:
    build:
      context: ./visualization
      dockerfile: Dockerfile
    container_name: visualization_service
    env_file:
      - .env
    depends_on:
      - db
      - data_load
      - data_research
    volumes:
      - ./reports:/app/reports
      - ./plots:/app/plots
    networks:
      - analytics_network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web_service
    env_file:
      - .env
    depends_on:
      - db
      - data_quality_analysis
      - data_research
      - visualization
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./plots:/app/plots
    networks:
      - analytics_network

volumes:
  postgres_data:

networks:
  analytics_network:
    driver: bridge