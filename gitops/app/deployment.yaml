apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  namespace: myapp
spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
        - name: myapp

          image: zhmudanastasiia/web:latest

          ports:
            - containerPort: 3000

          env:
            - name: ENVIRONMENT
              value: production