apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: myapp
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ZhmudAnastasiia/open-data-ai-analytics-docker.git
    targetRevision: main
    path: gitops/app

  destination:
    server: https://kubernetes.default.svc
    namespace: myapp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true